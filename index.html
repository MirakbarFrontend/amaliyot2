<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Amaliyot2</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet" />

		<link rel="stylesheet" href="css/styles.css" />
	</head>
	<body>
		<div class="container">
			<div class="top">
				<div class="top__container">
					<div class="top__left">
						<img class="top__left-img" src="img/amaliyot-img.svg" alt="amaliyot-img" />
						<h2 class="top__left-title">24-25-26-Iyun</h2>
					</div>
					<div class="top__right">
						<img class="top__right-img" src="img/amaliyot-img2.svg" alt="amaliyot-img2" />
						<h2 class="top__right-title">20:00</h2>
					</div>
				</div>
			</div>
			<h1 class="title"><b>razgavorga chiqish</b> uchun <span>aniq plan</span> kerakmi?</h1>

			<div class="back">
				<img class="back__back" src="img/backround.png" alt="backround" />
				<img class="back__castle" src="img/back-castle.png" alt="back-castle" />
				<img class="back__flag" src="img/back-flag.png" alt="back-flag" />
				<img class="back__cluds" src="img/back-cluds.png" alt="back-cluds" />
				<img class="back__woman" src="img/woman.png" alt="woman" />
			</div>

			<button class="btn">
				<div class="btn__div">
					<img class="btn__img" src="img/btn-star.svg" alt="btn-star" />
				</div>
				bepul qatnashish
			</button>
			<div class="bottom">
				<h2 class="bottom__title">darsda siz:</h2>
				<ul class="bottom__list">
					<li class="bottom__list-item">
						<div class="bottom__list-item-num">01</div>
						<p class="bottom__list-item-text"><span>1-darsni o’zidayoq</span> Rus tilida gapirishni boshlaysiz</p>
					</li>
					<li class="bottom__list-item">
						<div class="bottom__list-item-num">02</div>
						<p class="bottom__list-item-text">Savollardan javob yulib, <span>avtomat, hayajonlanmasdan</span> gapirasiz</p>
					</li>
					<li class="bottom__list-item">
						<div class="bottom__list-item-num">03</div>
						<p class="bottom__list-item-text">
							Qoʻshimchalarni <span>tez</span> va <span>onson</span> qoʻshib, gapirish xaritasini beraman
						</p>
					</li>
				</ul>
			</div>
			<button class="btn">
				<div class="btn__div">
					<img class="btn__img" src="img/btn-star.svg" alt="btn-star" />
				</div>
				bepul qatnashish
			</button>
		</div>
		<script src="js/main.js"></script>
	</body>
</html>
